#?ini charset="utf-8"?

[PusherSettings]
RequestTimeout=60
VerifySsl=enabled
SignatureHeaderName=Signature

[TriggersSettings]
# must implements OCWebHookTriggerInterface
#TriggerList[]=DummyTrigger
#TriggerList[]=PostPublishWebHookTrigger

# must implements OCWebHookTriggerFactoryInterface
#TriggerFactoryList[]

[KafkaSettings]
# Abilita la produzione su Kafka (enabled/disabled)
# Richiede l'estensione PHP rdkafka (php-rdkafka)
Enabled=disabled

# Lista dei broker Kafka/MSK (host:porta)
Brokers[]
#Brokers[]=broker1.example.com:9092
#Brokers[]=broker2.example.com:9092

# Topic di destinazione
Topic=cms

# Timeout flush producer in ms
# MSK in condizioni normali risponde in poche decine di ms; 2000ms è il massimo accettabile
# per non appesantire il processo di pubblicazione. Oltre questo limite il job rimane
# PENDING e il cron webhook_retry lo riprende.
FlushTimeoutMs=2000

# Il cron webhook_retry riprende solo i job più vecchi di N secondi
# Evita race condition con il path sincrono in caso di lentezza del broker
CronRetryAfterSeconds=300