#?ini charset="utf-8"?

[PusherSettings]
RequestTimeout=60
VerifySsl=enabled
SignatureHeaderName=Signature

[TriggersSettings]
# must implements OCWebHookTriggerInterface
#TriggerList[]=DummyTrigger
#TriggerList[]=PostPublishWebHookTrigger

# must implements OCWebHookTriggerFactoryInterface
#TriggerFactoryList[]

[KafkaSettings]
# Abilita la produzione su Kafka (enabled/disabled)
# Richiede l'estensione PHP rdkafka (php-rdkafka)
Enabled=disabled

# Lista dei broker Kafka/MSK (host:porta)
Brokers[]
#Brokers[]=broker1.example.com:9092
#Brokers[]=broker2.example.com:9092

# Topic di destinazione
Topic=cms

# Identificativo univoco dell'istanza nel Tenant Manager (UUID)
# Usato come tenant-uuid in ce_source: urn:opencity:<ProductSlug>:<TenantId>
TenantId=

# Slug del prodotto (es. website)
# Usato in ce_source e ce_type
ProductSlug=website

# Nome della variante del prodotto (es. website-comuni, website-asl)
# Usato come oc_app_name negli header Kafka
AppName=website-comuni

# Versione dell'applicativo
# Usato come oc_app_version negli header Kafka
AppVersion=

# Protocollo di sicurezza: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
# MSK senza IAM tipicamente usa SASL_SSL (porta 9096) o SSL (porta 9094)
# o PLAINTEXT (porta 9092) se accesso da VPC senza autenticazione
SecurityProtocol=PLAINTEXT

# Meccanismo SASL (solo se SecurityProtocol=SASL_PLAINTEXT o SASL_SSL)
# Valori: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
SaslMechanism=

# Credenziali SASL (solo se SaslMechanism è configurato)
SaslUsername=
SaslPassword=

# Timeout flush producer in ms
# MSK in condizioni normali risponde in poche decine di ms; 2000ms è il massimo accettabile
# per non appesantire il processo di pubblicazione. Oltre questo limite il job rimane
# PENDING e il cron webhook_retry lo riprende.
FlushTimeoutMs=2000

# Il cron webhook_retry riprende solo i job più vecchi di N secondi
# Evita race condition con il path sincrono in caso di lentezza del broker
CronRetryAfterSeconds=300

# Tempo massimo in secondi prima che un job rimasto in RUNNING venga
# riportato in PENDING dal cronjob reset_running_jobs (CronjobPart-frequent).
# Usare un valore superiore al timeout massimo atteso per un produce Kafka.
RunningJobTimeoutSeconds=300

# Mappa trigger → suffisso ce_type (es. post_publish_ocopendata=content.published)
# Il ce_type completo sarà: it.opencity.<ProductSlug>.<valore>
# Se un trigger non è in mappa viene usato l'identifier grezzo come fallback.
[KafkaCeTypeMap]
#post_publish_ocopendata=content.published
#delete_ocopendata=content.deleted

# Prefisso del nome webhook usato come fallback HTTP verso Redpanda Connect.
# I webhook il cui nome inizia con questo prefisso vengono cancellati quando
# il produce diretto su Kafka ha successo, per evitare duplicati.
# Convenzione: "kafka-push-{objectId}" (es. kafka-push-42)
FallbackWebhookPrefix=kafka-push-